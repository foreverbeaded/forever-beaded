    <path d="M178 140 h112 m-112 0 v112 M1005 140 h-112 m112 0 v112 M178 650 h112 m-112 0 v-112 M1005 650 h-112 m112 0 v-112" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round"/>
